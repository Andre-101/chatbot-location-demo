<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="Encuentra el punto más conveniente para realizar tu operación.">
  <meta name="theme-color" content="#f4f7fb">
  <title>Encuentra dónde hacerlo</title>

  <link rel="preconnect" href="https://unpkg.com">
  <link rel="preconnect" href="https://tile.openstreetmap.org">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">↗</span>
        <div>
          <p class="brand-kicker">Asistente</p>
          <h1>¿Qué necesitas hacer?</h1>
        </div>
      </div>

      <div class="header-actions">
        <span id="api-status" class="service-status" aria-live="polite">
          <span class="status-dot" aria-hidden="true"></span>
          Conectando
        </span>
        <button id="location-button" class="location-button" type="button">
          <span class="location-icon" aria-hidden="true">⌖</span>
          <span id="location-label">Activar ubicación</span>
        </button>
      </div>
    </header>

    <main class="workspace">
      <section class="conversation-card" aria-labelledby="conversation-title">
        <div class="section-title-row">
          <div>
            <p class="section-kicker">Consulta</p>
            <h2 id="conversation-title">Cuéntame tu operación</h2>
          </div>
        </div>

        <div class="quick-actions" aria-label="Operaciones frecuentes">
          <button class="quick-action" type="button" data-query="Necesito retirar dinero">Retirar</button>
          <button class="quick-action" type="button" data-query="Necesito depositar dinero">Depositar</button>
          <button class="quick-action" type="button" data-query="Necesito hacer un pago">Pagar</button>
          <button class="quick-action" type="button" data-query="Necesito hacer una transferencia">Transferir</button>
        </div>

        <div id="messages" class="messages" aria-live="polite" aria-label="Conversación">
          <article class="message assistant-message">
            <p>Indica la operación y el monto.</p>
          </article>
        </div>

        <form id="chat-form" class="composer">
          <label class="sr-only" for="chat-input">Escribe tu solicitud</label>
          <div class="input-wrap">
            <input
              id="chat-input"
              name="query"
              type="text"
              maxlength="500"
              autocomplete="off"
              inputmode="text"
              placeholder="Ej. Retirar 200.000 pesos"
              required
            >
            <button class="send-button" type="submit" aria-label="Enviar consulta">
              <span aria-hidden="true">→</span>
            </button>
          </div>
        </form>
      </section>

      <section class="result-card" aria-labelledby="result-title">
        <div class="result-topbar">
          <div>
            <p class="section-kicker">Mejor opción</p>
            <h2 id="result-title">Recomendación</h2>
          </div>
          <span id="result-state" class="result-state">Esperando consulta</span>
        </div>

        <div id="recommendation-empty" class="result-empty">
          <div class="empty-icon" aria-hidden="true">⌖</div>
          <p>Activa tu ubicación y escribe lo que necesitas.</p>
        </div>

        <article id="recommendation-card" class="recommendation hidden">
          <div class="recommendation-heading">
            <span id="recommendation-type" class="channel-badge"></span>
            <span id="recommendation-distance" class="distance-badge"></span>
          </div>

          <h3 id="recommendation-name"></h3>
          <p id="recommendation-address" class="address"></p>

          <div class="route-summary">
            <div>
              <span>Tiempo</span>
              <strong id="route-duration">—</strong>
            </div>
            <div>
              <span>Recorrido</span>
              <strong id="route-distance">—</strong>
            </div>
          </div>

          <p id="recommendation-reason" class="recommendation-reason"></p>

          <a id="open-route-link" class="route-button" href="#" target="_blank" rel="noopener noreferrer">
            Cómo llegar
            <span aria-hidden="true">↗</span>
          </a>
        </article>

        <div id="map" class="map" role="region" aria-label="Mapa de la ruta"></div>
      </section>
    </main>

    <section id="alternatives-section" class="alternatives-section hidden" aria-labelledby="alternatives-title">
      <div class="section-title-row">
        <div>
          <p class="section-kicker">Otras opciones</p>
          <h2 id="alternatives-title">También puedes ir a</h2>
        </div>
      </div>
      <div id="alternatives" class="alternatives-grid"></div>
    </section>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
